name: Release Version

# Manual trigger — promotes current dev images to production.
# Re-tags dev-latest multi-arch manifests as versioned (no rebuild).
# Deploys to prod VPS, fast-forwards production branch (Vercel), creates GitHub Release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.8.29)'
        required: true
        type: string
      title:
        description: 'Release title (e.g. "Streaming fixes, new onboarding")'
        required: true
        type: string
      description:
        description: 'Release description (optional, multi-line)'
        required: false
        type: string

concurrency:
  group: release-prod
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ inputs.version }}
  TITLE: ${{ inputs.title }}

jobs:
  # ── Re-tag dev images as versioned (no rebuild) ────────────────────────────
  retag-images:
    name: Re-tag dev → v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag all images
        run: |
          for IMAGE in ghcr.io/itsablabla/kortix-api ghcr.io/itsablabla/kortix-frontend ghcr.io/itsablabla/computer; do
            echo "Re-tagging $IMAGE:dev-latest → $IMAGE:${{ env.VERSION }} + $IMAGE:latest"

            # Use buildx imagetools to create new tags from existing multi-arch manifest
            docker buildx imagetools create \
              --tag "$IMAGE:${{ env.VERSION }}" \
              --tag "$IMAGE:latest" \
              "$IMAGE:dev-latest"

            echo "✓ $IMAGE:${{ env.VERSION }}"
          done

      - name: Summary
        run: |
          echo "### Re-tagged dev-latest → v${{ env.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/itsablabla/kortix-api:${{ env.VERSION }}\` (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/itsablabla/kortix-frontend:${{ env.VERSION }}\` (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/itsablabla/computer:${{ env.VERSION }}\` (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Zero rebuilds — re-tagged from dev-latest manifests._" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy to prod VPS (super.garzaos.online) ─────────────────────────────
  # Prod topology is ~/.kortix/ with docker-compose.yml + .env (image names
  # driven by env vars). Update the .env to point at the new GHCR-versioned
  # images, pull, and rolling-recreate. No nginx blue/green dance here —
  # prod fronts with Caddy, and docker compose handles the swap.
  deploy-prod:
    name: Deploy to prod
    needs: retag-images
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -euo pipefail
            cd ~/.kortix

            echo "[1/4] Updating .env to v${{ env.VERSION }} on GHCR..."
            # Backup + in-place bump of image refs and version vars
            cp .env ".env.bak.$(date +%s)"
            sed -i \
              -e "s|^API_IMAGE=.*|API_IMAGE=ghcr.io/itsablabla/kortix-api:${{ env.VERSION }}|" \
              -e "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=ghcr.io/itsablabla/kortix-frontend:${{ env.VERSION }}|" \
              -e "s|^SANDBOX_IMAGE=.*|SANDBOX_IMAGE=ghcr.io/itsablabla/computer:${{ env.VERSION }}|" \
              -e "s|^KORTIX_VERSION=.*|KORTIX_VERSION=${{ env.VERSION }}|" \
              -e "s|^KORTIX_SANDBOX_VERSION=.*|KORTIX_SANDBOX_VERSION=${{ env.VERSION }}|" \
              .env
            grep -E '^(API_IMAGE|FRONTEND_IMAGE|SANDBOX_IMAGE|KORTIX_VERSION|KORTIX_SANDBOX_VERSION)=' .env

            echo "[2/4] Pulling new images from GHCR..."
            docker compose pull

            echo "[3/4] Rolling recreate (docker compose up -d)..."
            docker compose up -d --remove-orphans

            echo "[4/4] Post-deploy verification..."
            sleep 8
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' | head -20

            # API container health probe (internal, via the compose network)
            if docker compose exec -T kortix-api curl -sf http://127.0.0.1:8008/v1/health >/dev/null 2>&1; then
              echo "  [OK] kortix-api /v1/health responding"
            else
              # Try the alternative health path
              docker compose exec -T kortix-api curl -sf http://127.0.0.1:8008/api/health >/dev/null 2>&1 \
                && echo "  [OK] kortix-api /api/health responding" \
                || (echo "  [FAIL] kortix-api health check failed"; docker compose logs --tail 40 kortix-api; exit 1)
            fi

      - name: Summary
        run: |
          echo "### Deployed v${{ env.VERSION }} to **prod** (super.garzaos.online)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- API:      \`ghcr.io/itsablabla/kortix-api:${{ env.VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: \`ghcr.io/itsablabla/kortix-frontend:${{ env.VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sandbox:  \`ghcr.io/itsablabla/computer:${{ env.VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Force-sync production branch to main (Vercel) ─────────────────────────
  update-production-branch:
    name: Force-sync production branch (Vercel)
    needs: retag-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Need a PAT with `workflow` scope to push workflow file changes
          # to the production branch (GITHUB_TOKEN cannot modify .github/workflows/*)
          token: ${{ secrets.GH_RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Force-sync production branch to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --force -B production origin/main
          git push --force-with-lease origin production
          echo "### Production branch force-synced to origin/main → Vercel deploys kortix.com" >> "$GITHUB_STEP_SUMMARY"

  # ── Create Git tag + GitHub Release ────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [deploy-prod, update-production-branch]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          {
            echo "## v${{ env.VERSION }} — ${{ env.TITLE }}"
            echo ""
            if [ -n "${{ inputs.description }}" ]; then
              echo "${{ inputs.description }}"
              echo ""
            fi
            echo "### Changes"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "### Docker Images"
            echo ""
            echo "- \`ghcr.io/itsablabla/computer:${{ env.VERSION }}\`"
            echo "- \`ghcr.io/itsablabla/kortix-api:${{ env.VERSION }}\`"
            echo "- \`ghcr.io/itsablabla/kortix-frontend:${{ env.VERSION }}\`"
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }} — ${{ env.TITLE }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }} — ${{ env.TITLE }}" \
            --notes-file /tmp/release-notes.md \
            --repo itsablabla/garza-suna
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Async: Build prod JustAVPS snapshot ────────────────────────────────────
  build-prod-snapshot:
    name: Build prod snapshot (async)
    needs: retag-images
    uses: ./.github/workflows/snapshot-build.yml
    with:
      version: ${{ inputs.version }}
      target: prod
    secrets: inherit
